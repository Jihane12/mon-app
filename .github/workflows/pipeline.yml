name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: mon-app
  REGISTRY: ghcr.io/jihane12

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # Stage 1 - Checkout
      - name: "① Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: echo "SHA = ${{ github.sha }}"

      # Stage 2 - Lint
      - name: "② Lint"
        run: |
          pip install flake8
          flake8 app/ --max-line-length=100

      # Stage 3 - Build & Test
      - name: "③ Build & Test"
        run: |
          pip install -r requirements.txt
          pytest tests/ --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

      # Stage 4+5 - SonarCloud
      - name: "④ SonarCloud Scan"
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Stage 6 - Trivy
      - name: "⑤ Build image pour Trivy"
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: "⑥ Trivy Security Scan"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: table
          exit-code: 0

      # Stage 7 - Push vers ghcr.io
      - name: "⑦ Login ghcr.io"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "⑦ Push image"
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      # Stage 8+9 - Smoke test local
      - name: "⑧⑨ Smoke Test"
        run: |
          docker run -d -p 8000:8000 --name app-test $IMAGE_NAME:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health
          docker stop app-test
